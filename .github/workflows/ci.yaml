name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  static:
    runs-on: ubuntu-slim
    timeout-minutes: 10
    permissions:
      contents: read # required by actions/checkout to fetch repository code

    steps:
      - name: Get code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Format Check
        run: pnpm format

      - name: Lint
        run: pnpm validate
